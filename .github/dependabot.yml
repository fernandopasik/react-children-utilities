---
version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    open-pull-requests-limit: 0
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /
    open-pull-requests-limit: 0
    schedule:
      interval: weekly
    groups:
      commitlint:
        patterns:
          - '@commitlint*'
